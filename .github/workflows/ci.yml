name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # GitHub cron uses UTC: 07:00 is 03:00 EDT / 02:00 EST.
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff format --check .
      - run: ruff check .
      - run: pytest
      - run: apt-ops validate .
      - name: Report nightly validation failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Nightly operations validation failed';
            const runUrl =
              context.serverUrl + '/' + context.repo.owner + '/' +
              context.repo.repo + '/actions/runs/' + context.runId;
            const body =
              'The scheduled nightly validation failed.\n\n' +
              'Failed run: ' + runUrl + '\n' +
              'Commit: ' + context.sha;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const existing = issues.find(
              issue => !issue.pull_request && issue.title === title
            );
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
            }
